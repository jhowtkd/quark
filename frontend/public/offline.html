<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUTUR.IA — Offline</title>
  <link rel="icon" type="image/png" href="/icon-192x192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 14px;
      color: #999;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button {
      font-family: 'Space Grotesk', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      background: #e0e0e0;
      color: #0a0a0a;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #fff;
    }
    button.secondary {
      background: transparent;
      color: #e0e0e0;
      border: 1px solid #444;
    }
    button.secondary:hover {
      border-color: #e0e0e0;
    }
    @media (prefers-color-scheme: light) {
      body {
        background: #f9f9f9;
        color: #1b1b1b;
      }
      .icon { border-color: #777; }
      p { color: #666; }
      button {
        background: #000;
        color: #e2e2e2;
      }
      button:hover { background: #333; }
      button.secondary {
        background: transparent;
        color: #1b1b1b;
        border-color: #777;
      }
      button.secondary:hover { border-color: #1b1b1b; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✕</div>
    <h1>Você está offline</h1>
    <p>Não foi possível conectar ao servidor. Verifique sua conexão com a internet e tente novamente.</p>
    <div class="actions">
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
      <button type="button" class="secondary" onclick="window.location.href='/'">Ir para início</button>
    </div>
  </div>
</body>
</html>
