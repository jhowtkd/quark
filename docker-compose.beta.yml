services:
  backend-beta:
    build: .
    container_name: futuria-backend-beta
    env_file:
      - .env.beta
    environment:
      - FLASK_DEBUG=false
      - FLASK_PORT=5002
      - UPLOAD_FOLDER=/app/uploads/beta
      - LOG_DIR=/app/logs/beta
    ports:
      - "5002:5002"
    restart: unless-stopped
    volumes:
      - beta-uploads:/app/uploads/beta
      - beta-logs:/app/logs/beta
    networks:
      - futuria-beta-network
    command: >
      sh -c "cd backend && uv run python run.py"

  frontend-beta:
    build: .
    container_name: futuria-frontend-beta
    env_file:
      - .env.beta
    environment:
      - VITE_API_BASE_URL=http://backend-beta:5002/api
    ports:
      - "4002:4002"
    restart: unless-stopped
    networks:
      - futuria-beta-network
    command: >
      sh -c "cd frontend && npm run build && npx vite preview --host --port 4002"

volumes:
  beta-uploads:
  beta-logs:

networks:
  futuria-beta-network:
    driver: bridge
